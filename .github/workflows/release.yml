name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # <-- REQUIRED for trusted publishing

jobs:
  build-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install PDM
        run: python -m pip install -U pip pdm

      - name: Install build deps (no project deps)
        run: pdm install --prod --no-self --no-editable

      - name: Build artifacts
        run: pdm build

      # Publish to TestPyPI for tags with a suffix like -rc, -beta, etc. (optional)
      - name: Publish to TestPyPI (pre-release only)
        if: contains(github.ref_name, '-')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

      # Publish stable to PyPI
      - name: Publish to PyPI
        if: ${{ !contains(github.ref_name, '-') }}
        uses: pypa/gh-action-pypi-publish@release/v1
