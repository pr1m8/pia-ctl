name: "✨ Feature request"
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes: { label: Problem to solve }
  - type: textarea
    id: proposal
    attributes: { label: Proposed solution }
  - type: textarea
    id: alternatives
    attributes: { label: Alternatives considered }
  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      options:
        - label: No backward-incompatible changes
        - label: Docs impacts identified
        - label: Tests will be added
